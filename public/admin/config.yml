backend:
  name: github
  repo: lsnhhhhh/petrykivka
  branch: main
  base_url: https://petrykivka-cms-auth.lisnyihor.workers.dev

# Глобальний fallback (майже не використовується — кожна колекція має свій)
media_folder: src/assets
public_folder: /assets

# Глобальна i18n-конфігурація
i18n:
  structure: multiple_folders
  locales: [uk, en]
  default_locale: uk

collections:
  # ====================== МАЙСТРИ ======================
  - name: masters
    label: "Майстри"
    label_singular: "Майстер"
    folder: src/content/masters
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: [name, born]
    summary: "{{name}}"
    # Куди завантажуються фото цієї колекції
    media_folder: "/src/assets/masters"
    # Який шлях записується у frontmatter (відносний від .md-файлу)
    public_folder: "../../../assets/masters"
    fields:
      - { label: "Ім'я", name: name, widget: string, i18n: true }
      - label: "Категорія"
        name: category
        widget: select
        i18n: duplicate
        options:
          - "Перше покоління"
          - "Друге покоління"
          - "Третє покоління"
          - "Четверте покоління"
          - "Пяте покоління"
          - "Самоучки"
          - "Дослідники петриківського розпису"
      - { label: "Фото", name: photo, widget: image, required: false, i18n: duplicate }
      - { label: "Рік народження", name: born, widget: string, required: false, i18n: duplicate }
      - { label: "Рік смерті", name: died, widget: string, required: false, i18n: duplicate }
      - { label: "Період", name: period, widget: string, required: false, i18n: true }
      - { label: "Осередок", name: center, widget: string, required: false, i18n: true }
      - label: "Школа"
        name: school
        widget: list
        required: false
        i18n: true
        field: { label: "Школа", name: item, widget: string }
      - label: "Вчителі"
        name: teachers
        widget: list
        required: false
        i18n: duplicate
        field: { label: "Ім'я", name: item, widget: string }
      - label: "Вплив на"
        name: influenced
        widget: list
        required: false
        i18n: duplicate
        field: { label: "Ім'я", name: item, widget: string }
      - label: "Теги"
        name: tags
        widget: list
        required: false
        i18n: true
        field: { label: "Тег", name: item, widget: string }
      - label: "Посилання"
        name: links
        widget: list
        required: false
        i18n: true
        fields:
          - { label: "Назва", name: title, widget: string }
          - { label: "URL", name: url, widget: string }
      - { label: "Текст (біографія)", name: body, widget: markdown, i18n: true }

  # ====================== ГАЛЕРЕЯ ======================
  - name: artworks
    label: "Галерея"
    label_singular: "Робота"
    folder: src/content/artworks
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: [title, year, decade]
    summary: "{{title}} — {{master}}"
    media_folder: "/src/assets/artworks"
    public_folder: "../../../assets/artworks"
    fields:
      - { label: "Назва роботи", name: title, widget: string, i18n: true }
      - { label: "Майстер", name: master, widget: string, i18n: duplicate, hint: "Має збігатися з іменем майстра на сайті" }
      - { label: "Зображення", name: image, widget: image, i18n: duplicate }
      - { label: "Рік", name: year, widget: string, required: false, i18n: duplicate }
      - label: "Десятиліття"
        name: decade
        widget: select
        required: false
        i18n: duplicate
        options: ["1910", "1920", "1930", "1940", "1950", "1960", "1970", "1980", "1990", "2000", "2010", "2020"]
        hint: "Для фільтру в галереї"
      - label: "Сюжет"
        name: subject
        widget: list
        required: false
        i18n: true
        field: { label: "Сюжет", name: item, widget: string }
        hint: "Квіти, Птахи, Калина, Панно..."
      - { label: "Матеріали", name: medium, widget: string, required: false, i18n: true, hint: "Темпера, папір" }
      - { label: "Розмір", name: dimensions, widget: string, required: false, i18n: duplicate, hint: "45 × 60 см" }
      - { label: "Де зберігається", name: location, widget: string, required: false, i18n: true, hint: "Має збігатися з назвою осередку для лінкування" }
      - label: "Основні елементи"
        name: elements
        widget: list
        required: false
        i18n: true
        field: { label: "Елемент", name: item, widget: string }
        hint: "Кучерявка, Цибулинка, Зернятко..."
      - { label: "Опис", name: description, widget: text, required: false, i18n: true }
      - { label: "Текст", name: body, widget: markdown, required: false, i18n: true }

  # ====================== ОСЕРЕДКИ ======================
  - name: centers
    label: "Осередки"
    label_singular: "Осередок"
    folder: src/content/centers
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: [name, founded]
    summary: "{{name}}"
    media_folder: "/src/assets/centers"
    public_folder: "../../../assets/centers"
    fields:
      - { label: "Назва", name: name, widget: string, i18n: true }
      - label: "Категорія"
        name: category
        widget: select
        i18n: duplicate
        options:
          - "Школи"
          - "Музеї"
          - "Приватні колекції"
          - "Організації та установи"
      - { label: "Розташування", name: location, widget: string, required: false, i18n: true }
      - { label: "Засновано", name: founded, widget: string, required: false, i18n: duplicate }
      - { label: "Закрито", name: closed, widget: string, required: false, i18n: duplicate }
      - { label: "Фото", name: photo, widget: image, required: false, i18n: duplicate }
      - label: "Майстри"
        name: masters
        widget: list
        required: false
        i18n: duplicate
        field: { label: "Ім'я", name: item, widget: string }
      - { label: "Сайт", name: website, widget: string, required: false, i18n: duplicate }
      - { label: "Адреса", name: address, widget: string, required: false, i18n: true }
      - { label: "Текст", name: body, widget: markdown, required: false, i18n: true }

  # ====================== КНИГИ ======================
  - name: books
    label: "Книги"
    label_singular: "Книга"
    folder: src/content/books
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: [title, year, author]
    summary: "{{title}}"
    media_folder: "/src/assets/books"
    public_folder: "../../../assets/books"
    fields:
      - { label: "Назва", name: title, widget: string, i18n: true }
      - { label: "Автор", name: author, widget: string, required: false, i18n: true }
      - { label: "Рік", name: year, widget: string, required: false, i18n: duplicate }
      - { label: "Видавництво", name: publisher, widget: string, required: false, i18n: true }
      - { label: "Мова", name: language, widget: string, required: false, i18n: duplicate }
      - label: "Категорія"
        name: category
        widget: select
        i18n: duplicate
        options:
          - "Альбоми"
          - "Альбоми про майстрів"
          - "Мистецтвознавчі дослідження"
          - "Оздоблені розписом"
          - "Наукові статті"
          - "Інше"
      - { label: "Обкладинка", name: cover, widget: image, required: false, i18n: duplicate }
      - label: "Майстри"
        name: masters
        widget: list
        required: false
        i18n: duplicate
        field: { label: "Ім'я", name: item, widget: string }
      - { label: "Посилання онлайн", name: externalUrl, widget: string, required: false, i18n: duplicate }
      - { label: "PDF", name: pdfUrl, widget: string, required: false, i18n: duplicate }
      - { label: "Текст", name: body, widget: markdown, required: false, i18n: true }

  # ====================== МАТЕРІАЛИ ======================
  - name: materials
    label: "Матеріали"
    label_singular: "Матеріал"
    folder: src/content/materials
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: [title, pubDate]
    summary: "{{title}}"
    media_folder: "/src/assets/materials"
    public_folder: "../../../assets/materials"
    fields:
      - { label: "Назва", name: title, widget: string, i18n: true }
      - { label: "Опис", name: description, widget: string, required: false, i18n: true }
      - label: "Категорія"
        name: category
        widget: select
        i18n: duplicate
        options:
          - "Галереї"
          - "Статті"
          - "Майстер-класи"
          - "Відео"
      - { label: "Обкладинка", name: cover, widget: image, required: false, i18n: duplicate }
      - { label: "URL відео", name: videoUrl, widget: string, required: false, i18n: duplicate }
      - { label: "Дата", name: pubDate, widget: datetime, required: false, i18n: duplicate }
      - { label: "Автор", name: author, widget: string, required: false, i18n: duplicate }
      - { label: "Джерело", name: source, widget: string, required: false, i18n: true }
      - { label: "URL джерела", name: sourceUrl, widget: string, required: false, i18n: duplicate }
      - label: "Майстри"
        name: masters
        widget: list
        required: false
        i18n: duplicate
        field: { label: "Ім'я", name: item, widget: string }
      - { label: "Текст", name: body, widget: markdown, required: false, i18n: true }

  # ====================== БЛОГ ======================
  - name: blog
    label: "Блог"
    label_singular: "Стаття"
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    i18n: true
    sortable_fields: [title, pubDate]
    summary: "{{title}} — {{pubDate}}"
    media_folder: "/src/assets/blog"
    public_folder: "../../../assets/blog"
    fields:
      - { label: "Заголовок", name: title, widget: string, i18n: true }
      - { label: "Опис", name: description, widget: string, i18n: true }
      - { label: "Дата", name: pubDate, widget: datetime, i18n: duplicate }
      - { label: "Головне зображення", name: heroImage, widget: image, required: false, i18n: duplicate }
      - { label: "Текст", name: body, widget: markdown, i18n: true }