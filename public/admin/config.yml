backend:
  name: git-gateway
  branch: main
media_folder: src/assets
public_folder: /assets

collections:
  - name: artworks
    label: "Галерея"
    folder: src/content/artworks/uk
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Locale", name: locale, widget: hidden, default: "uk" }
      - { label: "Назва роботи", name: title, widget: string }
      - { label: "Майстер", name: master, widget: string, hint: "Має збігатися з іменем майстра на сайті" }
      - { label: "Зображення", name: image, widget: image }
      - { label: "Рік", name: year, widget: string, required: false }
      - label: "Десятиліття"
        name: decade
        widget: select
        required: false
        options: ["1910", "1920", "1930", "1940", "1950", "1960", "1970", "1980", "1990", "2000", "2010", "2020"]
        hint: "Для фільтру в галереї"
      - label: "Сюжет"
        name: subject
        widget: list
        required: false
        field: { label: "Сюжет", name: item, widget: string }
        hint: "Квіти, Птахи, Калина, Панно..."
      - { label: "Матеріали", name: medium, widget: string, required: false, hint: "Темпера, папір" }
      - { label: "Розмір", name: dimensions, widget: string, required: false, hint: "45 × 60 см" }
      - { label: "Де зберігається", name: location, widget: string, required: false, hint: "Має збігатися з назвою осередку для лінкування" }
      - label: "Основні елементи"
        name: elements
        widget: list
        required: false
        field: { label: "Елемент", name: item, widget: string }
        hint: "Кучерявка, Цибулинка, Зернятко..."
      - { label: "Опис", name: description, widget: text, required: false }
      - { label: "Текст", name: body, widget: markdown, required: false }

  - name: masters
    label: "Майстри"
    folder: src/content/masters/uk
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Locale", name: locale, widget: hidden, default: "uk" }
      - { label: "Ім'я", name: name, widget: string }
      - label: "Категорія"
        name: category
        widget: select
        options:
          - "Перше покоління"
          - "Друге покоління"
          - "Третє покоління"
          - "Четверте покоління"
          - "Пяте покоління"
          - "Самоучки"
          - "Дослідники петриківського розпису"
      - { label: "Фото", name: photo, widget: image, required: false }
      - { label: "Рік народження", name: born, widget: string, required: false }
      - { label: "Рік смерті", name: died, widget: string, required: false }
      - { label: "Період", name: period, widget: string, required: false }
      - { label: "Осередок", name: center, widget: string, required: false }
      - label: "Школа"
        name: school
        widget: list
        required: false
        field: { label: "Школа", name: item, widget: string }
      - label: "Вчителі"
        name: teachers
        widget: list
        required: false
        field: { label: "Ім'я", name: item, widget: string }
      - label: "Вплив на"
        name: influenced
        widget: list
        required: false
        field: { label: "Ім'я", name: item, widget: string }
      - label: "Теги"
        name: tags
        widget: list
        required: false
        field: { label: "Тег", name: item, widget: string }
      - label: "Посилання"
        name: links
        widget: list
        required: false
        fields:
          - { label: "Назва", name: title, widget: string }
          - { label: "URL", name: url, widget: string }
      - { label: "Текст", name: body, widget: markdown }

  - name: books
    label: "Книги"
    folder: src/content/books/uk
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Locale", name: locale, widget: hidden, default: "uk" }
      - { label: "Назва", name: title, widget: string }
      - { label: "Автор", name: author, widget: string, required: false }
      - { label: "Рік", name: year, widget: string, required: false }
      - { label: "Видавництво", name: publisher, widget: string, required: false }
      - label: "Мова"
        name: language
        widget: string
        required: false
      - label: "Категорія"
        name: category
        widget: select
        options:
          - "Альбоми"
          - "Альбоми про майстрів"
          - "Мистецтвознавчі дослідження"
          - "Оздоблені розписом"
          - "Наукові статті"
          - "Інше"
      - { label: "Обкладинка", name: cover, widget: image, required: false }
      - label: "Майстри"
        name: masters
        widget: list
        required: false
        field: { label: "Ім'я", name: item, widget: string }
      - { label: "Посилання онлайн", name: externalUrl, widget: string, required: false }
      - { label: "PDF", name: pdfUrl, widget: string, required: false }
      - { label: "Текст", name: body, widget: markdown, required: false }

  - name: centers
    label: "Осередки"
    folder: src/content/centers/uk
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Locale", name: locale, widget: hidden, default: "uk" }
      - { label: "Назва", name: name, widget: string }
      - label: "Категорія"
        name: category
        widget: select
        options:
          - "Школи"
          - "Музеї"
          - "Приватні колекції"
          - "Організації та установи"
      - { label: "Розташування", name: location, widget: string, required: false }
      - { label: "Засновано", name: founded, widget: string, required: false }
      - { label: "Закрито", name: closed, widget: string, required: false }
      - { label: "Фото", name: photo, widget: image, required: false }
      - label: "Майстри"
        name: masters
        widget: list
        required: false
        field: { label: "Ім'я", name: item, widget: string }
      - { label: "Сайт", name: website, widget: string, required: false }
      - { label: "Адреса", name: address, widget: string, required: false }
      - { label: "Текст", name: body, widget: markdown, required: false }

  - name: materials
    label: "Матеріали"
    folder: src/content/materials/uk
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Locale", name: locale, widget: hidden, default: "uk" }
      - { label: "Назва", name: title, widget: string }
      - { label: "Опис", name: description, widget: string, required: false }
      - label: "Категорія"
        name: category
        widget: select
        options:
          - "Галереї"
          - "Статті"
          - "Майстер-класи"
          - "Відео"
      - { label: "Обкладинка", name: cover, widget: image, required: false }
      - { label: "URL відео", name: videoUrl, widget: string, required: false }
      - { label: "Дата", name: pubDate, widget: datetime, required: false }
      - { label: "Автор", name: author, widget: string, required: false }
      - { label: "Джерело", name: source, widget: string, required: false }
      - { label: "URL джерела", name: sourceUrl, widget: string, required: false }
      - label: "Майстри"
        name: masters
        widget: list
        required: false
        field: { label: "Ім'я", name: item, widget: string }
      - { label: "Текст", name: body, widget: markdown, required: false }

  - name: blog
    label: "Блог"
    folder: src/content/blog/uk
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Locale", name: locale, widget: hidden, default: "uk" }
      - { label: "Заголовок", name: title, widget: string }
      - { label: "Опис", name: description, widget: string }
      - { label: "Дата", name: pubDate, widget: datetime }
      - { label: "Головне зображення", name: heroImage, widget: image, required: false }
      - { label: "Текст", name: body, widget: markdown }